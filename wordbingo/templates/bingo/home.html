<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Bingo de Palabras</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #4f46e5, #111827);
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: rgba(17, 24, 39, 0.9);
      border-radius: 16px;
      padding: 32px 40px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
    }
    h1 {
      margin-top: 0;
      font-size: 2rem;
    }
    p {
      color: #d1d5db;
    }
    .buttons {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    .btn-primary {
      background: #22c55e;
      color: #022c22;
    }
    .btn-secondary {
      background: transparent;
      color: #e5e7eb;
      border: 1px solid #4b5563;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(55, 65, 81, 0.7);
      font-size: 0.75rem;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      🔊 Multiplayer
      <span>Tiempo real</span>
    </div>
    <h1>Bingo de Palabras</h1>
    <p>Entra a la sala, espera a que inicien todos y compite por completar tu cartón antes que los demás.</p>

    <div class="buttons">
      <a href="{% url 'accounts:login' %}" class="btn btn-primary">Iniciar sesión</a>
      <a href="{% url 'accounts:register' %}" class="btn btn-secondary">Crear cuenta</a>
    </div>
  </div>
</body>
</html>
